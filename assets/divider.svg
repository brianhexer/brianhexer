<svg width="100%" height="10" viewBox="0 0 1000 10" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="section divider">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0"/>
      <stop offset="15%" stop-color="#5B8DEF" stop-opacity="0.65"/>
      <stop offset="50%" stop-color="#8B7CF6" stop-opacity="0.75"/>
      <stop offset="85%" stop-color="#4FD1C5" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#4FD1C5" stop-opacity="0"/>
    </linearGradient>
    <filter id="dGlow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
  </defs>
  <rect x="0" y="4" width="1000" height="1.4" fill="url(#divGrad)" filter="url(#dGlow)"/>
  <rect x="0" y="4.5" width="1000" height="0.6" fill="url(#divGrad)"/>
