<svg width="420" height="100" viewBox="0 0 420 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HEPTHEX wordmark">
  <defs>
    <linearGradient id="hxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7FE6DC"/>
      <stop offset="50%" stop-color="#8B7CF6"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="hxGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .hxWord { font-family: 'Blanka', 'Arial Black', 'Haettenschweiler', 'Impact', sans-serif; font-weight: 900; font-size: 50px; letter-spacing: 5px; fill: url(#hxGrad); }
    </style>
  </defs>
  <text x="210" y="64" text-anchor="middle" class="hxWord" filter="url(#hxGlow)" transform="skewX(-6)">HEPTHEX</text>
</svg>
