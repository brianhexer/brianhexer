<svg width="100%" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Deepan P header banner">
  <defs>
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070A10"/>
      <stop offset="45%" stop-color="#0B0F1C"/>
      <stop offset="100%" stop-color="#0F1524"/>
    </linearGradient>

    <radialGradient id="blobBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5B8DEF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B7CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B7CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4FD1C5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4FD1C5" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="panelFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAF2FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#EAF2FF" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8FB4FF"/>
      <stop offset="55%" stop-color="#BFAEFF"/>
      <stop offset="100%" stop-color="#7FE6DC"/>
    </linearGradient>

    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="panelClip">
      <rect x="90" y="52" width="1020" height="236" rx="28"/>
    </clipPath>

    <style>
      @keyframes riseIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
      .nm { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 700; font-size: 54px; letter-spacing: 2px; fill: url(#nameGrad); animation: riseIn 1s ease-out forwards; }
      .rl { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 500; font-size: 18px; letter-spacing: 0.4px; fill: #C9D3E6; opacity: 0; animation: riseIn 1s ease-out 0.25s forwards; }
      .tg { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 600; font-size: 12.5px; letter-spacing: 3px; fill: #7FE6DC; opacity: 0; animation: riseIn 1s ease-out 0.45s forwards; }
      .trace { fill: none; stroke: #5B8DEF; stroke-opacity: 0.16; stroke-width: 1.4; }
      .trace2 { fill: none; stroke: #8B7CF6; stroke-opacity: 0.14; stroke-width: 1.4; }
      .node { fill: #7FE6DC; opacity: 0.35; }
    </style>
  </defs>

  <rect width="1200" height="340" fill="url(#bgBase)"/>

  <!-- circuit trace backdrop -->
  <g>
    <path class="trace" d="M0,60 H140 V110 H320 V60 H520"/>
    <path class="trace" d="M1200,90 H1040 V40 H860 V90 H700"/>
    <path class="trace2" d="M0,270 H180 V300 H400"/>
    <path class="trace2" d="M1200,250 H980 V300 H760"/>
    <path class="trace" d="M60,0 V40 H160 V150"/>
    <path class="trace2" d="M1140,340 V300 H1040 V190"/>
    <circle class="node" cx="320" cy="60" r="3.5"/>
    <circle class="node" cx="520" cy="60" r="3.5"/>
    <circle class="node" cx="860" cy="40" r="3.5"/>
    <circle class="node" cx="180" cy="300" r="3.5"/>
    <circle class="node" cx="980" cy="300" r="3.5"/>
    <circle class="node" cx="160" cy="150" r="3.5"/>
  </g>

  <!-- ambient glass light -->
  <circle cx="220" cy="90" r="180" fill="url(#blobBlue)" filter="url(#softBlur)"/>
  <circle cx="980" cy="80" r="200" fill="url(#blobViolet)" filter="url(#softBlur)"/>
  <circle cx="620" cy="300" r="220" fill="url(#blobTeal)" filter="url(#softBlur)"/>

  <!-- glass panel -->
  <rect x="90" y="52" width="1020" height="236" rx="28" fill="url(#panelFill)" stroke="url(#panelStroke)" stroke-width="1.2"/>
  <g clip-path="url(#panelClip)">
    <rect x="60" y="30" width="420" height="300" fill="url(#sheen)" transform="rotate(-18 270 180)"/>
  </g>

  <text x="600" y="170" text-anchor="middle" class="nm" filter="url(#glow)">DEEPAN P</text>
  <text x="600" y="208" text-anchor="middle" class="rl">Full-Stack Developer · AI/ML Engineer · VLSI Design Engineer</text>
  <text x="600" y="248" text-anchor="middle" class="tg">FOUNDER — HEPTHEX</text>
</svg>
