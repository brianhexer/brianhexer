<svg width="100%" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Deepan P footer banner">
  <defs>
    <linearGradient id="fBgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1524"/>
      <stop offset="55%" stop-color="#0B0F1C"/>
      <stop offset="100%" stop-color="#070A10"/>
    </linearGradient>
    <radialGradient id="fBlobViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B7CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B7CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fBlobTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4FD1C5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4FD1C5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fPanelFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAF2FF" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#EAF2FF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="fPanelStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="fBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <style>
      .fSign { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 500; font-size: 17px; fill: #C9D3E6; }
      .fTrace { fill: none; stroke: #5B8DEF; stroke-opacity: 0.14; stroke-width: 1.3; }
      .fTrace2 { fill: none; stroke: #4FD1C5; stroke-opacity: 0.14; stroke-width: 1.3; }
    </style>
  </defs>

  <rect width="1200" height="220" fill="url(#fBgBase)"/>

  <path class="fTrace" d="M0,40 H160 V80 H360"/>
  <path class="fTrace2" d="M1200,50 H1020 V90 H820"/>
  <path class="fTrace" d="M0,190 H220 V160 H420"/>
  <path class="fTrace2" d="M1200,180 H960 V150 H760"/>

  <circle cx="200" cy="60" r="170" fill="url(#fBlobViolet)" filter="url(#fBlur)"/>
  <circle cx="1000" cy="150" r="180" fill="url(#fBlobTeal)" filter="url(#fBlur)"/>

  <rect x="120" y="55" width="960" height="110" rx="24" fill="url(#fPanelFill)" stroke="url(#fPanelStroke)" stroke-width="1.1"/>

  <text x="600" y="118" text-anchor="middle" class="fSign">Thanks for stopping by — let's build something that ships.</text>
</svg>
